<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Estilos/style.css">
    <link rel="stylesheet" href="Estilos/register.css">
    <title>Registro</title>
</head>

<body>
    <h1 id="form-title">Formulario de Registro</h1>
    <section class="card-register">
        <form id="registerForm">
            <label>Nombres: </label>
            <input type="text" id="names" required>
            <label>Apellidos: </label>
            <input type="text" id="lastNames" required>
            <label>Ciudad: </label>
            <input type="text" id="city" required>
            <label>Fecha de nacimiento: </label>
            <input type="date" id="dateOfBirth" required>
            <label>Correo electronico: </label>
            <input type="email" id="email" required>
            <label>Escriba su contraseña: </label>
            <input type="password" required>
            <label>Confirme su contraseña: </label>
            <input type="password" id="psd" required>
            <button type="submit">Registrarse</button>
        </form>
    </section>
</body>
<script src="scripts/user.js"></script>

</html>
